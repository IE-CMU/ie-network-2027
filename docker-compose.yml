name: ie_network_2027
services:
  db:
    container_name: db_ien
    image: postgres:18-alpine
    restart: always
    environment:
      - PGPORT=${POSTGRES_PORT} # Set the PostgreSQL internal port
      - TZ=Asia/Bangkok
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - ./_entrypoint:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    networks:
      - ie_network_2027
  redis:
    container_name: redis_ien
    image: redis:8-alpine
    restart: always
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - redis_data:/data
    networks:
      - ie_network_2027
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}"
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_ien
    restart: always
    ports:
      - ${REDIS_INSIGHT_PORT}:${REDIS_INSIGHT_PORT}
    environment:
      - RI_APP_PORT=${REDIS_INSIGHT_PORT}
    volumes:
      - redisinsight_data:/data
    networks:
      - ie_network_2027
volumes:
  db_data:
  redis_data:
  redisinsight_data:
networks:
  ie_network_2027:
    driver: bridge
