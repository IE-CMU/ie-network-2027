name: ie_network_2027
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3010:4321"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
  db:
    container_name: db_ien
    image: postgres:18-alpine
    restart: always
    environment:
      - TZ=Asia/Bangkok
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./_entrypoint:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    networks:
      - ie_network_2027
  redis:
    container_name: redis_ien
    image: redis:8-alpine
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    networks:
      - ie_network_2027
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD}"
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_ien
    restart: always
    ports:
      - '5540:5540'
    volumes:
      - redisinsight_data:/data
    networks:
      - ie_network_2027
volumes:
  db_data:
  redis_data:
  redisinsight_data:
networks:
  ie_network_2027:
    driver: bridge
