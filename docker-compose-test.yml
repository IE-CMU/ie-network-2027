name: ie_network_2027
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - SERVER_PORT=${SERVER_PORT}
      - POSTGRES_HOST=db_ien
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://ie-network-2027.eng.cmu.ac.th
      - GMAIL_USER=${GMAIL_USER}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - REDIS_HOST=redis_ien
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - ie_network_2027
  db:
    container_name: db_ien
    image: postgres:18-alpine
    restart: always
    environment:
      - PGPORT=${POSTGRES_PORT} # Set the PostgreSQL internal port
      - TZ=Asia/Bangkok
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - ./_entrypoint:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    networks:
      - ie_network_2027
  redis:
    container_name: redis_ien
    image: redis:8-alpine
    restart: always
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - redis_data:/data
    networks:
      - ie_network_2027
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}"
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_ien
    restart: always
    ports:
      - ${REDIS_INSIGHT_PORT}:${REDIS_INSIGHT_PORT}
    environment:
      - RI_APP_PORT=${REDIS_INSIGHT_PORT}
    volumes:
      - redisinsight_data:/data
    networks:
      - ie_network_2027
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - SERVER_PORT=${SERVER_PORT}
      - POSTGRES_HOST=db_ien
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://ie-network-2027.eng.cmu.ac.th
      - GMAIL_USER=${GMAIL_USER}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - REDIS_HOST=redis_ien
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - ie_network_2027
volumes:
  db_data:
  redis_data:
  redisinsight_data:
networks:
  ie_network_2027:
    driver: bridge