name: ie_network_2027
services:
  web:
    image: nnnpooh/ie_network_2027:latest
    ports:
      - "3010:4321"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - POSTGRES_HOST=db_ien
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://ie-network-2027.eng.cmu.ac.th
      - GMAIL_USER=${GMAIL_USER}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - REDIS_HOST=redis_ien
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - ie_network_2027
  db:
    container_name: db_ien
    image: postgres:18-alpine
    restart: always
    environment:
      - TZ=Asia/Bangkok
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./_entrypoint:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    networks:
      - ie_network_2027
  redis:
    container_name: redis_ien
    image: redis:8-alpine
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    networks:
      - ie_network_2027
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD}"
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_ien
    restart: always
    ports:
      - '5510:5540'
    volumes:
      - redisinsight_data:/data
    networks:
      - ie_network_2027
volumes:
  db_data:
  redis_data:
  redisinsight_data:
networks:
  ie_network_2027:
    driver: bridge
